name: Alloy build and release

on:
  push:
    branches:
      - '**'
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: alloy-build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_linux_amd64:
    name: Build linux/amd64 (${{ matrix.profile }})
    if: github.event_name != 'push' || !startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        profile: [full, slim]
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node.js
        if: matrix.profile == 'full'
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version-file: internal/web/ui/.nvmrc
          cache: npm
          cache-dependency-path: internal/web/ui/package-lock.json

      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y make gcc xz-utils file

      - name: Build Alloy (${{ matrix.profile }})
        run: |
          if [ "${{ matrix.profile }}" = "slim" ]; then
            ./scripts/build-linux-amd64-slim.sh
          else
            ./scripts/build-linux-amd64.sh
          fi
        env:
          VERSION: ${{ github.sha }}

  release_linux_amd64:
    name: Release linux/amd64
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version-file: internal/web/ui/.nvmrc
          cache: npm
          cache-dependency-path: internal/web/ui/package-lock.json

      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y make gcc xz-utils file

      - name: Build full profile
        run: ./scripts/build-linux-amd64.sh
        env:
          VERSION: ${{ github.ref_name }}

      - name: Package full binary
        run: |
          mkdir -p dist
          cp build/alloy dist/alloy-linux-amd64
          chmod +x dist/alloy-linux-amd64
          xz -9 -k dist/alloy-linux-amd64

      - name: Build slim profile
        run: ./scripts/build-linux-amd64-slim.sh
        env:
          VERSION: ${{ github.ref_name }}

      - name: Package slim binary
        run: |
          cp build/alloy dist/alloy-linux-amd64-slim
          chmod +x dist/alloy-linux-amd64-slim
          xz -9 -k dist/alloy-linux-amd64-slim
          ls -lh dist/

      - name: Publish GitHub release
        uses: softprops/action-gh-release@288696be3916479e99fa944c72825e9b3e192be4 # v2.0.3
        with:
          name: Alloy ${{ github.ref_name }}
          files: |
            dist/alloy-linux-amd64.xz
            dist/alloy-linux-amd64-slim.xz
          generate_release_notes: false
          body: |
            dontmint Alloy **${{ github.ref_name }}** — linux/amd64 release with **full** and **slim** build profiles.

            ## Assets

            | File | Profile | Description |
            | --- | --- | --- |
            | `alloy-linux-amd64.xz` | **full** | Full distribution with embedded UI (`embedalloyui`) and all Flow components |
            | `alloy-linux-amd64-slim.xz` | **slim** | Metrics-focused build (`alloy_slim`): host/process/docker/smartctl/postgres exporters, Prometheus scrape/remote_write, `otelcol.receiver.sqlquery` — no embedded UI |

            Build profile details: `docs/build-profiles.md`

            ## What's new

            ### `otelcol.receiver.sqlquery` (Public Preview)
            - OTel SQL Query Receiver for SQL metrics migration
            - ClickHouse (`clickhouse-go/v2`) and Postgres (`lib/pq`) drivers linked
            - Forked `internal/sqlquery` adds `driver = "clickhouse"` support (upstream v0.147.0 omits it)
            - Requires Alloy `--stability.level=public-preview`
            - Handoff: `docs/sqlqueryreceiver-build-handoff.md`

            ### `prometheus.exporter.smartctl`
            - SMART disk health metrics via smartctl JSON (Linux)

            ### `prometheus.exporter.docker_state`
            - Docker container state metrics from the local daemon

            ## Usage examples

            ```alloy
            otelcol.receiver.sqlquery "example" {
              driver              = "clickhouse"
              datasource          = "clickhouse://user:pass@host:9000/default"
              collection_interval = "60s"
              query {
                sql = "SELECT 1 AS value"
                metric {
                  metric_name  = "sql_example"
                  value_column = "value"
                  data_type    = "gauge"
                  value_type   = "double"
                }
              }
              output {
                metrics = [otelcol.exporter.prometheus.default.input]
              }
            }
            ```

            Unpack full: `xz -d alloy-linux-amd64.xz && chmod +x alloy-linux-amd64`

            Unpack slim: `xz -d alloy-linux-amd64-slim.xz && chmod +x alloy-linux-amd64-slim`
