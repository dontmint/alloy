name: Alloy build and release

on:
  push:
    branches:
      - '**'
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: alloy-build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_linux_amd64:
    name: Build linux/amd64
    if: github.event_name != 'push' || !startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version-file: internal/web/ui/.nvmrc
          cache: npm
          cache-dependency-path: internal/web/ui/package-lock.json

      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y make gcc xz-utils file

      - name: Build Alloy with embedded UI
        run: ./scripts/build-linux-amd64.sh
        env:
          VERSION: ${{ github.sha }}

  release_linux_amd64:
    name: Release linux/amd64
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version-file: internal/web/ui/.nvmrc
          cache: npm
          cache-dependency-path: internal/web/ui/package-lock.json

      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y make gcc xz-utils file

      - name: Build Alloy with embedded UI
        run: ./scripts/build-linux-amd64.sh
        env:
          VERSION: ${{ github.ref_name }}

      - name: Package binary
        run: |
          mkdir -p dist
          cp build/alloy dist/alloy-linux-amd64
          chmod +x dist/alloy-linux-amd64
          xz -9 -k dist/alloy-linux-amd64
          ls -lh dist/

      - name: Publish GitHub release
        uses: softprops/action-gh-release@288696be3916479e99fa944c72825e9b3e192be4 # v2.0.3
        with:
          name: Alloy ${{ github.ref_name }}
          files: dist/alloy-linux-amd64.xz
          generate_release_notes: false
          body: |
            dontmint Alloy **v1.17.0-extended** — Scaleflex extended distribution (embedded UI, `embedalloyui`).

            ## What's new in this release

            ### `otelcol.receiver.sqlquery` (Public Preview)
            - OTel SQL Query Receiver for central sql_exporter migration
            - ClickHouse (`clickhouse-go/v2`) and Postgres (`lib/pq`) drivers linked
            - Forked `internal/sqlquery` adds `driver = "clickhouse"` support (upstream v0.147.0 omits it)
            - Requires Alloy `--stability.level=public-preview`
            - Handoff: `docs/sqlqueryreceiver-build-handoff.md`

            ### `prometheus.exporter.smartctl`
            - SMART disk health metrics via smartctl JSON (Linux)
            - Configurable scan interval, rescan, device include/exclude filters

            ### `prometheus.exporter.docker_state`
            - Docker container state metrics from the local daemon (replaces cadvisor/Vector path for state)

            ## Usage examples

            ```alloy
            otelcol.receiver.sqlquery "example" {
              driver              = "clickhouse"
              datasource          = "clickhouse://user:pass@host:9000/default"
              collection_interval = "60s"
              query {
                sql = "SELECT 1 AS value"
                metric {
                  metric_name  = "sql_example"
                  value_column = "value"
                  data_type    = "gauge"
                  value_type   = "double"
                }
              }
              output {
                metrics = [otelcol.exporter.prometheus.default.input]
              }
            }

            prometheus.exporter.smartctl "example" {
              smartctl_path     = "/usr/sbin/smartctl"
              smartctl_interval = "60s"
            }

            prometheus.exporter.docker_state "example" {
              docker_host   = "unix:///var/run/docker.sock"
              cache_period  = 1
              enable_labels = true
            }
            ```

            Unpack: `xz -d alloy-linux-amd64.xz && chmod +x alloy-linux-amd64`
